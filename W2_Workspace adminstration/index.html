<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slack Admin – Workshop 2: Workspace Administration</title>
  <style>
    :root {
      --bg:        #1a1d21;
      --surface:   #222529;
      --surface2:  #2c2f33;
      --border:    #383a3e;
      --purple:    #611f69;
      --purple-l:  #7c4d96;
      --blue:      #36c5f0;
      --green:     #2eb67d;
      --red:       #e01e5a;
      --yellow:    #ecb22e;
      --text:      #d1d2d3;
      --text-dim:  #7a7f87;
      --white:     #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--purple);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slack-logo {
      width: 32px; height: 32px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
    }
    .slack-logo span {
      border-radius: 3px;
      display: block;
    }
    .slack-logo span:nth-child(1) { background: #36c5f0; }
    .slack-logo span:nth-child(2) { background: #2eb67d; }
    .slack-logo span:nth-child(3) { background: #ecb22e; }
    .slack-logo span:nth-child(4) { background: #e01e5a; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--white); }
    header p  { font-size: 0.78rem; color: rgba(255,255,255,0.7); margin-top: 2px; }

    /* ── Mode Toggle ── */
    .mode-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: var(--white);
      font-weight: 600;
    }
    .mode-label { font-size: 0.78rem; color: var(--text-dim); margin-left: 6px; }

    /* ── Progress ── */
    .progress-wrap {
      padding: 20px 24px 0;
      max-width: 780px;
      margin: 0 auto;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 5px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── Score ── */
    .score-bar {
      max-width: 780px;
      margin: 10px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
    }
    .score-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }

    /* ── Card ── */
    .card-wrap {
      max-width: 780px;
      margin: 20px auto 40px;
      padding: 0 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      background: var(--surface2);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .q-badge {
      font-size: 0.75rem;
      color: var(--blue);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .q-category {
      font-size: 0.72rem;
      color: var(--text-dim);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .card-body { padding: 24px 20px; }
    .question-text {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--white);
      margin-bottom: 24px;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice {
      padding: 13px 18px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.92rem;
    }
    .choice:hover { border-color: var(--purple-l); background: rgba(97,31,105,0.1); }
    .choice-key {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .choice.selected  { border-color: var(--purple-l); background: rgba(97,31,105,0.18); }
    .choice.correct   { border-color: var(--green);    background: rgba(46,182,125,0.12); }
    .choice.wrong     { border-color: var(--red);      background: rgba(224,30,90,0.12);  }
    .choice.correct .choice-key { background: var(--green);  border-color: var(--green);  color: var(--white); }
    .choice.wrong   .choice-key { background: var(--red);    border-color: var(--red);    color: var(--white); }
    .choice.dimmed  { opacity: 0.4; cursor: default; }

    /* ── Explanation ── */
    .explanation {
      margin-top: 20px;
      padding: 16px 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.7;
      display: none;
    }
    .explanation.show { display: block; }
    .explanation-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .explanation table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.83rem;
    }
    .explanation th, .explanation td {
      padding: 7px 10px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .explanation th { background: var(--surface2); color: var(--text-dim); }
    .explanation td:last-child { text-align: center; }
    .tag-o { color: var(--green); font-weight: 700; }
    .tag-x { color: var(--red);   font-weight: 700; }

    /* ── Multi-select hint ── */
    .multi-hint {
      font-size: 0.8rem;
      color: var(--yellow);
      background: rgba(236,178,46,0.1);
      border: 1px solid rgba(236,178,46,0.3);
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 14px;
      display: none;
    }
    .multi-hint.show { display: block; }

    /* ── Action Buttons ── */
    .actions {
      padding: 0 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary   { background: var(--purple); color: var(--white); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-success   { background: var(--green); color: var(--white); }

    .nav-btns { display: flex; gap: 8px; }

    /* ── Result Screen ── */
    .result-screen {
      max-width: 780px;
      margin: 40px auto;
      padding: 0 24px;
      display: none;
      text-align: center;
    }
    .result-screen.show { display: block; }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 32px;
    }
    .result-emoji { font-size: 3.5rem; margin-bottom: 16px; }
    .result-title { font-size: 1.4rem; font-weight: 700; color: var(--white); margin-bottom: 8px; }
    .result-score { font-size: 2.8rem; font-weight: 800; color: var(--blue); margin: 16px 0; }
    .result-sub   { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 28px; }
    .result-breakdown {
      display: flex; justify-content: center; gap: 32px;
      margin: 20px 0 32px;
    }
    .rb-item { text-align: center; }
    .rb-num  { font-size: 1.8rem; font-weight: 700; }
    .rb-label{ font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .green-num { color: var(--green); }
    .red-num   { color: var(--red); }

    /* ── Study mode badge ── */
    .study-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(236,178,46,0.15);
      border: 1px solid var(--yellow);
      color: var(--yellow);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="slack-logo">
    <span></span><span></span><span></span><span></span>
  </div>
  <div>
    <h1>Slack Admin Certification <span id="study-mode-badge" class="study-badge" style="display:none">📖 Study Mode</span></h1>
    <p>Workshop 2 · Workspace Administration</p>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-quiz"  onclick="setMode('quiz')">🧠 Quiz Mode</button>
  <button class="mode-btn"        id="btn-study" onclick="setMode('study')">📖 Study Mode</button>
  <span class="mode-label" id="mode-desc">선택 후 정답 확인</span>
</div>

<!-- Progress -->
<div class="progress-wrap" id="progress-wrap">
  <div class="progress-info">
    <span id="prog-label">1 / <span id="total-q"></span></span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
<div class="score-bar" id="score-bar">
  <div class="score-item"><div class="dot dot-green"></div><span id="score-correct">0</span> 정답</div>
  <div class="score-item"><div class="dot dot-red"></div><span id="score-wrong">0</span> 오답</div>
</div>

<!-- Quiz card -->
<div class="card-wrap" id="card-wrap">
  <div class="card">
    <div class="card-header">
      <span class="q-badge" id="q-num">Q1</span>
      <span class="q-category" id="q-category"></span>
    </div>
    <div class="card-body">
      <p class="question-text" id="q-text"></p>
      <div class="multi-hint" id="multi-hint">✦ 복수 선택 — 정답 <span id="multi-count"></span>개를 고르세요</div>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation">
        <div class="explanation-title">💡 해설</div>
        <div id="explanation-body"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">↺ 처음부터</button>
      <div class="nav-btns">
        <button class="btn btn-secondary" id="btn-prev" onclick="navigate(-1)">← 이전</button>
        <button class="btn btn-primary"   id="btn-submit" onclick="submitAnswer()">정답 확인</button>
        <button class="btn btn-success"   id="btn-next" onclick="navigate(1)" style="display:none">다음 →</button>
      </div>
    </div>
  </div>
</div>

<!-- Result screen -->
<div class="result-screen" id="result-screen">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title">퀴즈 완료!</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-sub">Workshop 2 · Workspace Administration</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-num green-num" id="rb-correct"></div><div class="rb-label">정답</div></div>
      <div class="rb-item"><div class="rb-num red-num"   id="rb-wrong"></div><div class="rb-label">오답</div></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--text-dim)" id="rb-total"></div><div class="rb-label">전체</div></div>
    </div>
    <button class="btn btn-primary" onclick="resetQuiz()" style="font-size:0.95rem;padding:11px 32px">↺ 다시 풀기</button>
  </div>
</div>

<script>
/* ─────────────── QUESTION DATA ─────────────── */
const QUESTIONS = [
  {
    id: 1,
    category: "Enterprise Grid Design",
    text: "Which of the following considerations should an organization prioritize in their Enterprise Grid design?",
    choices: [
      "The number of multi-workspace channels they anticipate needing",
      "Existing knowledge networks",
      "Custom terms of service",
      "The number of announcement channels needed to communicate to the whole team"
    ],
    answer: 1, // Existing knowledge networks
    explanation: `
      <p>Enterprise Grid 설계 시 가장 우선시해야 할 고려사항은 <strong style="color:var(--green)">Existing knowledge networks (기존 지식 네트워크)</strong>입니다.</p>
      <p style="margin-top:8px">조직이 이미 보유한 지식 구조와 소통 방식을 기반으로 워크스페이스를 설계해야 합니다. 팀과 부서가 어떻게 협업하고 정보를 공유하는지를 파악한 뒤, 그 흐름에 맞게 Enterprise Grid의 워크스페이스 구조를 구성하는 것이 핵심입니다.</p>
      <table>
        <thead><tr><th>고려사항</th><th>우선순위</th><th>이유</th></tr></thead>
        <tbody>
          <tr><td><strong>Existing knowledge networks</strong></td><td><span class="tag-o">✓ 최우선</span></td><td>조직의 실제 협업 구조를 반영한 설계의 기반</td></tr>
          <tr><td>Multi-workspace channels 수</td><td><span class="tag-x">✗</span></td><td>설계 결과물이지, 출발점이 아님</td></tr>
          <tr><td>Custom terms of service</td><td><span class="tag-x">✗</span></td><td>법적/정책 기능이며 구조 설계와 무관</td></tr>
          <tr><td>Announcement channels 수</td><td><span class="tag-x">✗</span></td><td>운영 세부 사항이며 설계 우선순위가 아님</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 2,
    category: "Enterprise Grid Design",
    text: "A ___________ is a shared hub made up of channels wherein team members can communicate and work together.",
    choices: [
      "channel",
      "workspace",
      "organization",
      "Enterprise Grid"
    ],
    answer: 1, // workspace
    explanation: `
      <p><strong style="color:var(--green)">Workspace(워크스페이스)</strong>는 채널들로 구성된 공유 허브로, 팀원들이 소통하고 협업하는 공간입니다.</p>
      <table>
        <thead><tr><th>용어</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td><strong>Workspace</strong></td><td>채널들로 구성된 공유 허브 — 팀원들이 소통하고 협업하는 공간 <span class="tag-o">✓</span></td></tr>
          <tr><td>Channel</td><td>워크스페이스 내 특정 주제/팀을 위한 소통 공간 (허브가 아님) <span class="tag-x">✗</span></td></tr>
          <tr><td>Organization</td><td>Enterprise Grid에서 여러 워크스페이스를 묶는 최상위 단위 <span class="tag-x">✗</span></td></tr>
          <tr><td>Enterprise Grid</td><td>대규모 조직을 위한 Slack 플랜/아키텍처 <span class="tag-x">✗</span></td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 3,
    category: "Enterprise Grid Design",
    text: "Which of the following is FALSE of Enterprise Grid design?",
    choices: [
      "It is a series of design decisions that impact how employees work within your Slack environment.",
      "It is meant to be a static and unchanging framework to meet company goals.",
      "It will likely be totally unique to your company.",
      "Includes choices you make about the model and structure; roles and responsibilities; policies and settings; and architecture and security.",
      "While it often takes place during the launch of a new Enterprise Grid org, its best practices are equally useful in guiding the maturation of Slack at your organization."
    ],
    answer: 1, // FALSE statement — static and unchanging
    explanation: `
      <p><strong style="color:var(--red)">B가 거짓(FALSE)</strong>입니다. Enterprise Grid 설계는 고정된 불변의 프레임워크가 아니라, 회사의 성장과 변화에 따라 지속적으로 발전하는 살아있는 설계입니다.</p>
      <table>
        <thead><tr><th>선택지</th><th>참/거짓</th><th>설명</th></tr></thead>
        <tbody>
          <tr><td>A — 직원 업무 방식에 영향을 주는 설계 결정의 연속</td><td><span class="tag-o">참</span></td><td>Enterprise Grid 설계의 핵심 정의</td></tr>
          <tr><td><strong>B — 고정된 불변의 프레임워크</strong></td><td><span class="tag-x">거짓</span></td><td>설계는 조직의 성숙도에 따라 지속적으로 진화해야 함</td></tr>
          <tr><td>C — 회사마다 완전히 고유할 가능성이 높음</td><td><span class="tag-o">참</span></td><td>조직 구조와 문화에 따라 설계가 달라짐</td></tr>
          <tr><td>D — 모델/구조, 역할/책임, 정책/설정, 아키텍처/보안 선택 포함</td><td><span class="tag-o">참</span></td><td>Enterprise Grid 설계의 4가지 핵심 영역</td></tr>
          <tr><td>E — 런칭 시뿐 아니라 Slack 성숙화 과정에도 유용</td><td><span class="tag-o">참</span></td><td>지속적인 운영 가이드로서의 역할</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 4,
    category: "Enterprise Grid Benefits",
    text: "Complete the sentence with the best match.\n\nDecreased overhead ___________",
    choices: [
      "so members can get work done in the right place right away.",
      "with pre-approved apps and automation via Slack workflows.",
      "through clear roles and responsibilities at the org, workspace and member levels.",
      "through holistic settings that align to your organization's specific security policies."
    ],
    answer: 2,
    explanation: `
      <p><strong style="color:var(--green)">Decreased overhead</strong> → <em>through clear roles and responsibilities at the org, workspace and member levels.</em></p>
      <p style="margin-top:8px">org·워크스페이스·멤버 레벨에서 역할과 책임을 명확히 정의하면 불필요한 관리 부담(overhead)이 줄어듭니다.</p>
    `
  }
  ,
  {
    id: 5,
    category: "Enterprise Grid Benefits",
    text: "Complete the sentence with the best match.\n\nIncreased efficiency ___________",
    choices: [
      "with a clear and flexible structure.",
      "with pre-approved apps and automation via Slack workflows.",
      "to measure and promote success across the org.",
      "and increased ability to focus."
    ],
    answer: 1,
    explanation: `
      <p><strong style="color:var(--green)">Increased efficiency</strong> → <em>with pre-approved apps and automation via Slack workflows.</em></p>
      <p style="margin-top:8px">사전 승인된 앱과 Slack 워크플로우 자동화를 통해 업무 효율성이 향상됩니다.</p>
    `
  }
  ,
  {
    id: 6,
    category: "Enterprise Grid Benefits",
    text: "Complete the sentence with the best match.\n\nIncreased security and compliance ___________",
    choices: [
      "so members can get work done in the right place right away.",
      "through clear roles and responsibilities at the org, workspace and member levels.",
      "with a clear and flexible structure.",
      "through holistic settings that align to your organization's specific security policies."
    ],
    answer: 3,
    explanation: `
      <p><strong style="color:var(--green)">Increased security and compliance</strong> → <em>through holistic settings that align to your organization's specific security policies.</em></p>
      <p style="margin-top:8px">조직의 보안 정책에 맞춘 통합적 설정을 통해 보안과 규정 준수가 강화됩니다.</p>
    `
  }
  ,
  {

/* ─────────────── STATE ─────────────── */
let mode         = 'quiz';
let current      = 0;
let answered     = new Array(QUESTIONS.length).fill(null);
let correct      = 0;
let wrong        = 0;
let selectedIdxs = [];

/* ─────────────── INIT ─────────────── */
document.getElementById('total-q').textContent = QUESTIONS.length;
document.getElementById('rb-total').textContent = QUESTIONS.length;
renderQuestion();

/* ─────────────── MODE ─────────────── */
function setMode(m) {
  mode = m;
  document.getElementById('btn-quiz').classList.toggle('active',  m === 'quiz');
  document.getElementById('btn-study').classList.toggle('active', m === 'study');
  document.getElementById('mode-desc').textContent = m === 'quiz' ? '선택 후 정답 확인' : '정답+해설 바로 보기';
  document.getElementById('study-mode-badge').style.display = m === 'study' ? 'inline-flex' : 'none';
  resetQuiz();
}

/* ─────────────── RENDER ─────────────── */
function renderQuestion() {
  const q   = QUESTIONS[current];
  const ans = answered[current];

  document.getElementById('q-num').textContent      = `Q${current + 1}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent     = q.text;

  const isMulti    = Array.isArray(q.answers);
  const correctSet = isMulti ? q.answers : [q.answer];
  const ansArr     = ans === null ? null : Array.isArray(ans) ? ans : [ans];
  const multiHint  = document.getElementById('multi-hint');
  if (isMulti) {
    multiHint.classList.add('show');
    document.getElementById('multi-count').textContent = q.answers.length;
  } else {
    multiHint.classList.remove('show');
  }

  const keys      = ['A', 'B', 'C', 'D', 'E'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  q.choices.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.dataset.idx = i;

    const alreadyAnswered = ansArr !== null;
    const isCorrect       = correctSet.includes(i);
    const isSelected      = ansArr !== null && ansArr.includes(i);

    if (mode === 'study' || alreadyAnswered) {
      if (isCorrect)       div.classList.add('correct');
      else if (isSelected) div.classList.add('wrong');
      else                 div.classList.add('dimmed');
    } else if (selectedIdxs.includes(i)) {
      div.classList.add('selected');
    }

    div.innerHTML = `<span class="choice-key">${keys[i]}</span><span>${c}</span>`;

    if (!alreadyAnswered && mode === 'quiz') {
      div.addEventListener('click', () => selectChoice(i));
    }
    choicesEl.appendChild(div);
  });

  const expEl = document.getElementById('explanation');
  document.getElementById('explanation-body').innerHTML = q.explanation;
  if (mode === 'study' || ans !== null) {
    expEl.classList.add('show');
  } else {
    expEl.classList.remove('show');
  }

  const submitBtn = document.getElementById('btn-submit');
  const nextBtn   = document.getElementById('btn-next');
  const prevBtn   = document.getElementById('btn-prev');

  if (mode === 'study') {
    submitBtn.style.display = 'none';
    nextBtn.style.display   = current < QUESTIONS.length - 1 ? 'inline-block' : 'none';
  } else {
    if (ans !== null) {
      submitBtn.style.display = 'none';
      nextBtn.style.display   = current < QUESTIONS.length - 1 ? 'inline-block' : 'none';
    } else {
      submitBtn.style.display = 'inline-block';
      nextBtn.style.display   = 'none';
    }
  }

  prevBtn.disabled = current === 0;

  const done = answered.filter(a => a !== null).length;
  const pct  = Math.round(((mode === 'study' ? current : done) / QUESTIONS.length) * 100);
  document.getElementById('prog-label').innerHTML = `${current + 1} / <span>${QUESTIONS.length}</span>`;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent   = wrong;
}

/* ─────────────── SELECT ─────────────── */
function selectChoice(i) {
  if (answered[current] !== null) return;
  const isMulti = Array.isArray(QUESTIONS[current].answers);

  if (isMulti) {
    const pos = selectedIdxs.indexOf(i);
    if (pos === -1) selectedIdxs.push(i);
    else selectedIdxs.splice(pos, 1);
  } else {
    selectedIdxs = [i];
  }

  document.querySelectorAll('.choice').forEach((el, idx) => {
    el.classList.toggle('selected', selectedIdxs.includes(idx));
  });
}

/* ─────────────── SUBMIT ─────────────── */
function submitAnswer() {
  if (selectedIdxs.length === 0) {
    alert('답을 선택해 주세요.');
    return;
  }
  const q       = QUESTIONS[current];
  const isMulti = Array.isArray(q.answers);

  if (isMulti && selectedIdxs.length !== q.answers.length) {
    alert(`${q.answers.length}개를 선택해 주세요.`);
    return;
  }

  answered[current] = isMulti ? [...selectedIdxs] : selectedIdxs[0];

  const isCorrect = isMulti
    ? q.answers.every(a => selectedIdxs.includes(a)) && selectedIdxs.length === q.answers.length
    : selectedIdxs[0] === q.answer;

  if (isCorrect) correct++;
  else           wrong++;

  selectedIdxs = [];
  renderQuestion();

  if (current === QUESTIONS.length - 1) {
    setTimeout(showResult, 600);
  }
}

/* ─────────────── NAVIGATE ─────────────── */
function navigate(dir) {
  current = Math.max(0, Math.min(QUESTIONS.length - 1, current + dir));
  selectedIdxs = [];
  renderQuestion();
}

/* ─────────────── RESULT ─────────────── */
function showResult() {
  document.getElementById('card-wrap').style.display     = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('score-bar').style.display     = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('result-score').textContent   = pct + '%';
  document.getElementById('rb-correct').textContent     = correct;
  document.getElementById('rb-wrong').textContent       = wrong;
  document.getElementById('result-emoji').textContent   = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '📚' : '💪';
}

/* ─────────────── RESET ─────────────── */
function resetQuiz() {
  current      = 0;
  answered     = new Array(QUESTIONS.length).fill(null);
  correct      = 0;
  wrong        = 0;
  selectedIdxs = [];

  document.getElementById('card-wrap').style.display     = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('score-bar').style.display     = '';
  document.getElementById('result-screen').classList.remove('show');
  renderQuestion();
}
</script>
