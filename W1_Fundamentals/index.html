<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slack Admin – Workshop 1: Fundamentals</title>
  <style>
    :root {
      --bg:        #1a1d21;
      --surface:   #222529;
      --surface2:  #2c2f33;
      --border:    #383a3e;
      --purple:    #611f69;
      --purple-l:  #7c4d96;
      --blue:      #36c5f0;
      --green:     #2eb67d;
      --red:       #e01e5a;
      --yellow:    #ecb22e;
      --text:      #d1d2d3;
      --text-dim:  #7a7f87;
      --white:     #ffffff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--purple);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .slack-logo {
      width: 32px; height: 32px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
    }
    .slack-logo span {
      border-radius: 3px;
      display: block;
    }
    .slack-logo span:nth-child(1) { background: #36c5f0; }
    .slack-logo span:nth-child(2) { background: #2eb67d; }
    .slack-logo span:nth-child(3) { background: #ecb22e; }
    .slack-logo span:nth-child(4) { background: #e01e5a; }
    header h1 { font-size: 1.1rem; font-weight: 700; color: var(--white); }
    header p  { font-size: 0.78rem; color: rgba(255,255,255,0.7); margin-top: 2px; }

    /* ── Mode Toggle ── */
    .mode-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-btn {
      padding: 6px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn.active {
      background: var(--purple);
      border-color: var(--purple);
      color: var(--white);
      font-weight: 600;
    }
    .mode-label { font-size: 0.78rem; color: var(--text-dim); margin-left: 6px; }

    /* ── Progress ── */
    .progress-wrap {
      padding: 20px 24px 0;
      max-width: 780px;
      margin: 0 auto;
    }
    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .progress-bar {
      height: 5px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--blue));
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    /* ── Score ── */
    .score-bar {
      max-width: 780px;
      margin: 10px auto 0;
      padding: 0 24px;
      display: flex;
      gap: 16px;
      font-size: 0.8rem;
    }
    .score-item { display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--green); }
    .dot-red   { background: var(--red); }

    /* ── Card ── */
    .card-wrap {
      max-width: 780px;
      margin: 20px auto 40px;
      padding: 0 24px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      background: var(--surface2);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .q-badge {
      font-size: 0.75rem;
      color: var(--blue);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .q-category {
      font-size: 0.72rem;
      color: var(--text-dim);
      background: var(--bg);
      padding: 3px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .card-body { padding: 24px 20px; }
    .question-text {
      font-size: 1rem;
      line-height: 1.65;
      color: var(--white);
      margin-bottom: 24px;
    }

    /* ── Choices ── */
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice {
      padding: 13px 18px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.92rem;
    }
    .choice:hover { border-color: var(--purple-l); background: rgba(97,31,105,0.1); }
    .choice-key {
      width: 26px; height: 26px;
      border-radius: 6px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .choice.selected  { border-color: var(--purple-l); background: rgba(97,31,105,0.18); }
    .choice.correct   { border-color: var(--green);    background: rgba(46,182,125,0.12); }
    .choice.wrong     { border-color: var(--red);      background: rgba(224,30,90,0.12);  }
    .choice.correct .choice-key { background: var(--green);  border-color: var(--green);  color: var(--white); }
    .choice.wrong   .choice-key { background: var(--red);    border-color: var(--red);    color: var(--white); }
    .choice.dimmed  { opacity: 0.4; cursor: default; }

    /* ── Explanation ── */
    .explanation {
      margin-top: 20px;
      padding: 16px 18px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.7;
      display: none;
    }
    .explanation.show { display: block; }
    .explanation-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--blue);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .explanation table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.83rem;
    }
    .explanation th, .explanation td {
      padding: 7px 10px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .explanation th { background: var(--surface2); color: var(--text-dim); }
    .explanation td:last-child { text-align: center; }
    .tag-o { color: var(--green); font-weight: 700; }
    .tag-x { color: var(--red);   font-weight: 700; }

    /* ── Multi-select hint ── */
    .multi-hint {
      font-size: 0.8rem;
      color: var(--yellow);
      background: rgba(236,178,46,0.1);
      border: 1px solid rgba(236,178,46,0.3);
      border-radius: 6px;
      padding: 6px 12px;
      margin-bottom: 14px;
      display: none;
    }
    .multi-hint.show { display: block; }

    /* ── Action Buttons ── */
    .actions {
      padding: 0 20px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .btn {
      padding: 9px 22px;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-primary   { background: var(--purple); color: var(--white); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-success   { background: var(--green); color: var(--white); }

    .nav-btns { display: flex; gap: 8px; }

    /* ── Result Screen ── */
    .result-screen {
      max-width: 780px;
      margin: 40px auto;
      padding: 0 24px;
      display: none;
      text-align: center;
    }
    .result-screen.show { display: block; }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 32px;
    }
    .result-emoji { font-size: 3.5rem; margin-bottom: 16px; }
    .result-title { font-size: 1.4rem; font-weight: 700; color: var(--white); margin-bottom: 8px; }
    .result-score { font-size: 2.8rem; font-weight: 800; color: var(--blue); margin: 16px 0; }
    .result-sub   { font-size: 0.9rem; color: var(--text-dim); margin-bottom: 28px; }
    .result-breakdown {
      display: flex; justify-content: center; gap: 32px;
      margin: 20px 0 32px;
    }
    .rb-item { text-align: center; }
    .rb-num  { font-size: 1.8rem; font-weight: 700; }
    .rb-label{ font-size: 0.78rem; color: var(--text-dim); margin-top: 2px; }
    .green-num { color: var(--green); }
    .red-num   { color: var(--red); }

    /* ── Study mode badge ── */
    .study-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(236,178,46,0.15);
      border: 1px solid var(--yellow);
      color: var(--yellow);
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<header>
  <div class="slack-logo">
    <span></span><span></span><span></span><span></span>
  </div>
  <div>
    <h1>Slack Admin Certification <span id="study-mode-badge" class="study-badge" style="display:none">📖 Study Mode</span></h1>
    <p>Workshop 1 · Fundamentals</p>
  </div>
</header>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-quiz"  onclick="setMode('quiz')">🧠 Quiz Mode</button>
  <button class="mode-btn"        id="btn-study" onclick="setMode('study')">📖 Study Mode</button>
  <span class="mode-label" id="mode-desc">선택 후 정답 확인</span>
</div>

<!-- Progress -->
<div class="progress-wrap" id="progress-wrap">
  <div class="progress-info">
    <span id="prog-label">1 / <span id="total-q"></span></span>
    <span id="prog-pct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>
<div class="score-bar" id="score-bar">
  <div class="score-item"><div class="dot dot-green"></div><span id="score-correct">0</span> 정답</div>
  <div class="score-item"><div class="dot dot-red"></div><span id="score-wrong">0</span> 오답</div>
</div>

<!-- Quiz card -->
<div class="card-wrap" id="card-wrap">
  <div class="card">
    <div class="card-header">
      <span class="q-badge" id="q-num">Q1</span>
      <span class="q-category" id="q-category"></span>
    </div>
    <div class="card-body">
      <p class="question-text" id="q-text"></p>
      <div class="multi-hint" id="multi-hint">✦ 복수 선택 — 정답 <span id="multi-count"></span>개를 고르세요</div>
      <div class="choices" id="choices"></div>
      <div class="explanation" id="explanation">
        <div class="explanation-title">💡 해설</div>
        <div id="explanation-body"></div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-secondary" id="btn-reset" onclick="resetQuiz()">↺ 처음부터</button>
      <div class="nav-btns">
        <button class="btn btn-secondary" id="btn-prev" onclick="navigate(-1)">← 이전</button>
        <button class="btn btn-primary"   id="btn-submit" onclick="submitAnswer()">정답 확인</button>
        <button class="btn btn-success"   id="btn-next" onclick="navigate(1)" style="display:none">다음 →</button>
      </div>
    </div>
  </div>
</div>

<!-- Result screen -->
<div class="result-screen" id="result-screen">
  <div class="result-card">
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-title">퀴즈 완료!</div>
    <div class="result-score" id="result-score"></div>
    <div class="result-sub">Workshop 1 · Fundamentals</div>
    <div class="result-breakdown">
      <div class="rb-item"><div class="rb-num green-num" id="rb-correct"></div><div class="rb-label">정답</div></div>
      <div class="rb-item"><div class="rb-num red-num"   id="rb-wrong"></div><div class="rb-label">오답</div></div>
      <div class="rb-item"><div class="rb-num" style="color:var(--text-dim)" id="rb-total"></div><div class="rb-label">전체</div></div>
    </div>
    <button class="btn btn-primary" onclick="resetQuiz()" style="font-size:0.95rem;padding:11px 32px">↺ 다시 풀기</button>
  </div>
</div>

<script>
/* ─────────────── QUESTION DATA ─────────────── */
const QUESTIONS = [
  {
    id: 1,
    category: "Slack Plans",
    text: "You're currently evaluating which Slack plan to purchase for your company. You would like to restrict access on mobile devices to only those devices enrolled in your organization's Enterprise Mobility Management (EMM) service.\n\nWhich Slack plan should you select?",
    choices: [
      "Business+",
      "Pro",
      "Enterprise Grid",
      "Free"
    ],
    answer: 2, // 0-indexed → Enterprise Grid
    explanation: `
      <p>EMM(Enterprise Mobility Management) 연동을 통한 모바일 기기 접근 제한은 <strong style="color:var(--green)">Enterprise Grid</strong> 플랜에서만 지원되는 기능입니다.</p>
      <p style="margin-top:8px">Enterprise Grid는 대규모 조직을 위한 최상위 플랜으로, EMM 외에도 DLP(데이터 손실 방지), eDiscovery, 고급 보안 정책 등 엔터프라이즈급 보안 기능을 제공합니다.</p>
      <table>
        <thead><tr><th>플랜</th><th>EMM 지원</th></tr></thead>
        <tbody>
          <tr><td>Free</td><td><span class="tag-x">✗</span></td></tr>
          <tr><td>Pro</td><td><span class="tag-x">✗</span></td></tr>
          <tr><td>Business+</td><td><span class="tag-x">✗</span></td></tr>
          <tr><td><strong>Enterprise Grid</strong></td><td><span class="tag-o">✓</span></td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 2,
    category: "Slack Roles",
    text: "You are an Org Primary Owner on Enterprise Grid. Your organization has added many new users over the past few months resulting in an increase in administrative requests such as renaming and archiving public and private channels. You'd like to assign someone to help out.\n\nWhich Slack roles would be best suited to manage these requests? Select the two correct responses.",
    choices: [
      "Org Admin",
      "Channels Admin",
      "Roles Admin",
      "Channel Manager",
      "Users admin"
    ],
    answers: [1, 3], // Channels Admin, Channel Manager
    explanation: `
      <p>채널 관리(이름 변경, 아카이브) 권한을 위임하기에 적합한 역할은 <strong style="color:var(--green)">Channels Admin</strong>과 <strong style="color:var(--green)">Channel Manager</strong>입니다.</p>
      <table>
        <thead><tr><th>역할</th><th>채널 관리</th><th>설명</th></tr></thead>
        <tbody>
          <tr><td>Org Admin</td><td><span class="tag-x">✗</span></td><td>채널 전담 역할이 아님</td></tr>
          <tr><td><strong>Channels Admin</strong></td><td><span class="tag-o">✓</span></td><td>채널 rename·archive 전담 Admin 역할</td></tr>
          <tr><td>Roles Admin</td><td><span class="tag-x">✗</span></td><td>커스텀 역할/권한 관리 담당</td></tr>
          <tr><td><strong>Channel Manager</strong></td><td><span class="tag-o">✓</span></td><td>워크스페이스 내 채널 관리 전담 역할</td></tr>
          <tr><td>Users admin</td><td><span class="tag-x">✗</span></td><td>사용자 계정 관리 담당</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 3,
    category: "Slack User Types",
    text: "Match each role with its definition.\n\nWhich description correctly defines 'Members' in Slack?",
    choices: [
      "Have joined your workspace, but have limited access.",
      "Have joined your Slack workspace.",
      "Have been invited to your workspace, but have not accepted their invitation.",
      "Have special permissions to complete specific administrative tasks."
    ],
    answer: 1,
    explanation: `
      <p><strong style="color:var(--green)">Members</strong>는 워크스페이스에 합류한 일반 사용자입니다.</p>
      <table>
        <thead><tr><th>사용자 유형</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td><strong>Members</strong></td><td>have joined your Slack workspace.</td></tr>
          <tr><td>Guests</td><td>have joined your workspace, but have limited access.</td></tr>
          <tr><td>Invited Members</td><td>have been invited to your workspace, but have not accepted their invitation.</td></tr>
          <tr><td>System roles</td><td>have special permissions to complete specific administrative tasks.</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 4,
    category: "Slack User Types",
    text: "Match each role with its definition.\n\nWhich description correctly defines 'Guests' in Slack?",
    choices: [
      "Have joined your Slack workspace.",
      "Have special permissions to complete specific administrative tasks.",
      "Have joined your workspace, but have limited access.",
      "Have been invited to your workspace, but have not accepted their invitation."
    ],
    answer: 2,
    explanation: `
      <p><strong style="color:var(--green)">Guests</strong>는 워크스페이스에 합류했지만 제한된 접근 권한만 가진 사용자입니다.</p>
      <table>
        <thead><tr><th>사용자 유형</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td>Members</td><td>have joined your Slack workspace.</td></tr>
          <tr><td><strong>Guests</strong></td><td>have joined your workspace, but have limited access.</td></tr>
          <tr><td>Invited Members</td><td>have been invited to your workspace, but have not accepted their invitation.</td></tr>
          <tr><td>System roles</td><td>have special permissions to complete specific administrative tasks.</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 5,
    category: "Slack Roles",
    text: "Which role is described as 'the most powerful administrative role in Slack' on Enterprise Grid?",
    choices: [
      "Org Owner",
      "Org Admin",
      "Workspace Primary Owner",
      "Org Primary Owner"
    ],
    answer: 3,
    explanation: `
      <p><strong style="color:var(--green)">Org Primary Owner</strong>는 Enterprise Grid에서 가장 강력한 관리 역할입니다. org 소유권 이전 등 모든 권한을 보유합니다.</p>
      <table>
        <thead><tr><th>역할</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td><strong>Org Primary Owner</strong></td><td>the most powerful administrative role in Slack (Enterprise Grid).</td></tr>
          <tr><td>Org Owner</td><td>can't transfer ownership of the org, but can do most other things at the org level.</td></tr>
          <tr><td>Org Admin</td><td>help manage org-level administrative tasks.</td></tr>
          <tr><td>Workspace Primary Owner</td><td>hold the highest level of permission in a workspace (on Pro and Business+).</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 6,
    category: "Slack Roles",
    text: "Which role can't transfer ownership of the org, but can do most other things at the org level?",
    choices: [
      "Org Primary Owner",
      "Org Admin",
      "Org Owner",
      "Workspace Primary Owner"
    ],
    answer: 2,
    explanation: `
      <p><strong style="color:var(--green)">Org Owner</strong>는 org 소유권 이전만 불가능하며, 그 외 org 레벨의 대부분의 작업을 수행할 수 있습니다.</p>
      <table>
        <thead><tr><th>역할</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td>Org Primary Owner</td><td>the most powerful administrative role in Slack (Enterprise Grid).</td></tr>
          <tr><td><strong>Org Owner</strong></td><td>can't transfer ownership of the org, but can do most other things at the org level.</td></tr>
          <tr><td>Org Admin</td><td>help manage org-level administrative tasks.</td></tr>
          <tr><td>Workspace Primary Owner</td><td>hold the highest level of permission in a workspace (on Pro and Business+).</td></tr>
        </tbody>
      </table>
    `
  }
  ,
  {
    id: 7,
    category: "Slack Roles",
    text: "Which role is automatically assigned and can help with common channel management tasks?",
    choices: [
      "Channels Admin",
      "Workspace Admins",
      "Org Admin",
      "Channel Manager"
    ],
    answer: 3,
    explanation: `
      <p><strong style="color:var(--green)">Channel Manager</strong>는 자동으로 할당되며 일반적인 채널 관리 작업(rename, archive 등)을 도울 수 있습니다.</p>
      <p style="margin-top:8px">Channels Admin은 직접 지정하는 Admin 역할인 반면, Channel Manager는 자동 할당되는 점이 차이입니다.</p>
      <table>
        <thead><tr><th>역할</th><th>정의</th></tr></thead>
        <tbody>
          <tr><td>Workspace Owner</td><td>can't delete/transfer a workspace, but can do everything else except org administration.</td></tr>
          <tr><td>Workspace Admins</td><td>manage the members, channels, and other administrative tasks for a workspace.</td></tr>

/* ─────────────── STATE ─────────────── */
let mode         = 'quiz';   // 'quiz' | 'study'
let current      = 0;
let answered     = new Array(QUESTIONS.length).fill(null); // null | index | index[]
let correct      = 0;
let wrong        = 0;
let selectedIdxs = [];

/* ─────────────── INIT ─────────────── */
document.getElementById('total-q').textContent = QUESTIONS.length;
document.getElementById('rb-total').textContent = QUESTIONS.length;
renderQuestion();

/* ─────────────── MODE ─────────────── */
function setMode(m) {
  mode = m;
  document.getElementById('btn-quiz').classList.toggle('active',  m === 'quiz');
  document.getElementById('btn-study').classList.toggle('active', m === 'study');
  document.getElementById('mode-desc').textContent = m === 'quiz' ? '선택 후 정답 확인' : '정답+해설 바로 보기';
  document.getElementById('study-mode-badge').style.display = m === 'study' ? 'inline-flex' : 'none';
  resetQuiz();
}

/* ─────────────── RENDER ─────────────── */
function renderQuestion() {
  const q   = QUESTIONS[current];
  const ans = answered[current];

  document.getElementById('q-num').textContent      = `Q${current + 1}`;
  document.getElementById('q-category').textContent = q.category;
  document.getElementById('q-text').textContent     = q.text;

  // Multi-select hint
  const isMulti    = Array.isArray(q.answers);
  const correctSet = isMulti ? q.answers : [q.answer];
  const ansArr     = ans === null ? null : Array.isArray(ans) ? ans : [ans];
  const multiHint  = document.getElementById('multi-hint');
  if (isMulti) {
    multiHint.classList.add('show');
    document.getElementById('multi-count').textContent = q.answers.length;
  } else {
    multiHint.classList.remove('show');
  }

  // Choices
  const keys      = ['A', 'B', 'C', 'D', 'E'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  q.choices.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'choice';
    div.dataset.idx = i;

    const alreadyAnswered = ansArr !== null;
    const isCorrect       = correctSet.includes(i);
    const isSelected      = ansArr !== null && ansArr.includes(i);

    if (mode === 'study' || alreadyAnswered) {
      if (isCorrect)       div.classList.add('correct');
      else if (isSelected) div.classList.add('wrong');
      else                 div.classList.add('dimmed');
    } else if (selectedIdxs.includes(i)) {
      div.classList.add('selected');
    }

    div.innerHTML = `<span class="choice-key">${keys[i]}</span><span>${c}</span>`;

    if (!alreadyAnswered && mode === 'quiz') {
      div.addEventListener('click', () => selectChoice(i));
    }
    choicesEl.appendChild(div);
  });

  // Explanation
  const expEl = document.getElementById('explanation');
  document.getElementById('explanation-body').innerHTML = q.explanation;
  if (mode === 'study' || ans !== null) {
    expEl.classList.add('show');
  } else {
    expEl.classList.remove('show');
  }

  // Buttons
  const submitBtn = document.getElementById('btn-submit');
  const nextBtn   = document.getElementById('btn-next');
  const prevBtn   = document.getElementById('btn-prev');

  if (mode === 'study') {
    submitBtn.style.display = 'none';
    nextBtn.style.display   = current < QUESTIONS.length - 1 ? 'inline-block' : 'none';
  } else {
    if (ans !== null) {
      submitBtn.style.display = 'none';
      nextBtn.style.display   = current < QUESTIONS.length - 1 ? 'inline-block' : 'none';
    } else {
      submitBtn.style.display = 'inline-block';
      nextBtn.style.display   = 'none';
    }
  }

  prevBtn.disabled = current === 0;

  // Progress
  const done = answered.filter(a => a !== null).length;
  const pct  = Math.round(((mode === 'study' ? current : done) / QUESTIONS.length) * 100);
  document.getElementById('prog-label').innerHTML = `${current + 1} / <span>${QUESTIONS.length}</span>`;
  document.getElementById('prog-pct').textContent  = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('score-correct').textContent = correct;
  document.getElementById('score-wrong').textContent   = wrong;
}

/* ─────────────── SELECT ─────────────── */
function selectChoice(i) {
  if (answered[current] !== null) return;
  const isMulti = Array.isArray(QUESTIONS[current].answers);

  if (isMulti) {
    const pos = selectedIdxs.indexOf(i);
    if (pos === -1) selectedIdxs.push(i);
    else selectedIdxs.splice(pos, 1);
  } else {
    selectedIdxs = [i];
  }

  document.querySelectorAll('.choice').forEach((el, idx) => {
    el.classList.toggle('selected', selectedIdxs.includes(idx));
  });
}

/* ─────────────── SUBMIT ─────────────── */
function submitAnswer() {
  if (selectedIdxs.length === 0) {
    alert('답을 선택해 주세요.');
    return;
  }
  const q       = QUESTIONS[current];
  const isMulti = Array.isArray(q.answers);

  if (isMulti && selectedIdxs.length !== q.answers.length) {
    alert(`${q.answers.length}개를 선택해 주세요.`);
    return;
  }

  answered[current] = isMulti ? [...selectedIdxs] : selectedIdxs[0];

  const isCorrect = isMulti
    ? q.answers.every(a => selectedIdxs.includes(a)) && selectedIdxs.length === q.answers.length
    : selectedIdxs[0] === q.answer;

  if (isCorrect) correct++;
  else           wrong++;

  selectedIdxs = [];
  renderQuestion();

  if (current === QUESTIONS.length - 1) {
    setTimeout(showResult, 600);
  }
}

/* ─────────────── NAVIGATE ─────────────── */
function navigate(dir) {
  current = Math.max(0, Math.min(QUESTIONS.length - 1, current + dir));
  selectedIdxs = [];

  if (mode === 'study' && current === QUESTIONS.length - 1) {
    // stay on last question
  }
  renderQuestion();

  if (mode === 'study' && dir === 1 && current === QUESTIONS.length - 1) {
    // Optionally show a "completed" notice in study mode — no score screen
  }
}

/* ─────────────── RESULT ─────────────── */
function showResult() {
  document.getElementById('card-wrap').style.display     = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  document.getElementById('score-bar').style.display     = 'none';
  const rs = document.getElementById('result-screen');
  rs.classList.add('show');

  const pct = Math.round((correct / QUESTIONS.length) * 100);
  document.getElementById('result-score').textContent   = pct + '%';
  document.getElementById('rb-correct').textContent     = correct;
  document.getElementById('rb-wrong').textContent       = wrong;
  document.getElementById('result-emoji').textContent   = pct === 100 ? '🏆' : pct >= 80 ? '🎉' : pct >= 60 ? '📚' : '💪';
}

/* ─────────────── RESET ─────────────── */
function resetQuiz() {
  current    = 0;
  answered   = new Array(QUESTIONS.length).fill(null);
  correct      = 0;
  wrong        = 0;
  selectedIdxs = [];

  document.getElementById('card-wrap').style.display     = '';
  document.getElementById('progress-wrap').style.display = '';
  document.getElementById('score-bar').style.display     = '';
  document.getElementById('result-screen').classList.remove('show');
  renderQuestion();
}
</script>
